ci:
  autofix_commit_msg: 'chore: auto fixes from pre-commit hooks'
  autoupdate_commit_msg: 'chore: pre-commit automatic update'
  autoupdate_schedule: weekly

exclude: |
    (?x)^(
        codegen/kwd.json|
        codegen/additional-cards.json|
        benchmarks/.*|
        doc/source/.*|
        tests/.*|
        src/ansys/dyna/core/keywords/keyword_classes/auto/|
        src/ansys/dyna/core/keywords/keyword_classes/type_mapping.py|
        src/ansys/dyna/core/keywords/keyword_classes/auto_keywords.py|
        src/ansys/dyna/core/keywords/keyword_classes/manual/.*_version_.*\.py|
        .*\.k$
    )
repos:

- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: 5e2fb545eba1ea9dc051f6f962d52fe8f76a9794  # frozen: v0.15.13
  hooks:
    - id: ruff-check
      args: [--fix]
    - id: ruff-format

- repo: https://github.com/codespell-project/codespell
  rev: 2ccb47ff45ad361a21071a7eedda4c37e6ae8c5a  # frozen: v2.4.2
  hooks:
  - id: codespell
    args: ["--ignore-words", "doc/styles/config/vocabularies/ANSYS/accept.txt", "-w"]

- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
  hooks:
  - id: check-merge-conflict
  - id: debug-statements
  - id: check-yaml

# this validates our github workflow files
- repo: https://github.com/python-jsonschema/check-jsonschema
  rev: 943377262562a12b57292fc98fabd7dbf81451fe  # frozen: 0.37.2
  hooks:
    - id: check-github-workflows

- repo: https://github.com/ansys/pre-commit-hooks
  rev: ad4e7598809ad98cde5aaf52d80040c7ac56e7cf  # frozen: v0.7.2
  hooks:
    - id: add-license-headers
      files: '(src|tests|doc)/.*\.(py)'
      args:
      - --start_year=2023

- repo: https://github.com/zizmorcore/zizmor-pre-commit
  rev: 9257c6050c0261b8c57e712f632dc4a8010109a9  # frozen: v1.25.2
  hooks:
    - id: zizmor
      args: ["--pedantic"]