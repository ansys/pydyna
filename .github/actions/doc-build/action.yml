name: Documentation Build
description: Composite action to build and upload documentation (HTML and PDF)

inputs:

  build-autokeywords-api:
    description: Enable building the autokeywords API
    required: false
    default: "False"

  pdf-pool-size:
    required: false

  pdf-string-vacancies:
    required: false

  pdf-max-strings:
    required: false

  pydyna-run-container:
    description: Run container name
    required: true

  python-version:
    description: Python version to use
    required: true
    default: "3.13"
    type: string

  github-token:
    description: GitHub token for authentication
    required: true

  license-server:
    description: License server address
    required: true

  bot-token:
    description: Bot token for authentication
    required: true
  
  github-actor:
    description: GitHub actor for authentication
    required: true

  use_cache_examples:
    description: |
      Whether to use the examples cache. Default is "true".
    required: false
    default: true
    type: boolean


runs:
  using: "composite"
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@681c641aba71e4a1c380be3ab5e12ad51f415867 # v7.1.6
      with:
        enable-cache: true

    - name: Set up Python
      uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55
      with:
        python-version: ${{ inputs.python-version }}
        cache: 'pip'
        cache-dependency-path: 'pyproject.toml'

    - name: set up virtual environment
      run: |
        python -m venv .venv
      shell: bash

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install xvfb pandoc texlive-latex-extra latexmk
      shell: bash

    - name: Cache Sphinx build artifacts
      if: ${{ inputs.use_cache_examples == 'true' }}
      uses: actions/cache@9255dc7a253b0ccc959486e2bca901246202afeb #v5.0.1
      with:
        path: |
          doc/_build
          doc/source/examples/
        key: sphinx-${{ runner.os }}-${{ inputs.python-version }}-${{ hashFiles('doc/source/**/*.rst', 'doc/source/conf.py', 'pyproject.toml', 'examples/**/*') }}-${{ inputs.reset-cache }}
        restore-keys: |
          sphinx-${{ runner.os }}-${{ inputs.python-version }}-

    - name: Install python dependencies
      run: |
        source .venv/bin/activate
        uv pip install .[doc]
        uv pip install docker
      shell: bash

    - name: Set Licensing
      run: |
        echo "ANSYS_DPF_ACCEPT_LA=Y" >> $GITHUB_ENV
      shell: bash

    - name: Install DPF
      uses: ansys/pydpf-actions/install-dpf-server@v2.3 # zizmor: ignore[unpinned-uses]
      with:
        dpf-standalone-TOKEN: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
        ANSYS_VERSION : "252"

    - name: Set DPF environment
      run: |
        echo "=== Finding DPF Server Binaries ==="
        
        # The dpf-standalone/v252 is just the source, not the binaries
        # After pip install, binaries should be in the package data
        
        # Find where the actual server was installed
        PYTHON_SITE=$(python -c "import site; print(site.getsitepackages()[0])")
        echo "Python site-packages: ${PYTHON_SITE}"
        
        # Check common locations for DPF server binaries
        DPF_PATH=""
        
        # Check 1: Inside package at ansys_dpf_server_2025_2_pre0/ansys/v252
        if [ -d "${PYTHON_SITE}/ansys_dpf_server_2025_2_pre0/ansys/v252" ]; then
          echo "✓ Found DPF at package/ansys/v252"
          DPF_PATH="${PYTHON_SITE}/ansys_dpf_server_2025_2_pre0/ansys/v252"
          ls -la "${DPF_PATH}"
        fi
        
        # Check 2: Inside workspace at dpf-standalone/v252/ansys/v252
        if [ -z "${DPF_PATH}" ] && [ -d "${GITHUB_WORKSPACE}/dpf-standalone/v252/ansys/v252" ]; then
          echo "✓ Found DPF at workspace/dpf-standalone/v252/ansys/v252"
          DPF_PATH="${GITHUB_WORKSPACE}/dpf-standalone/v252/ansys/v252"
          ls -la "${DPF_PATH}"
        fi
        
        # Check 3: Search for aisol directory anywhere
        if [ -z "${DPF_PATH}" ]; then
          echo "Searching for aisol directory..."
          AISOL_PATH=$(find "${PYTHON_SITE}/ansys_dpf_server_2025_2_pre0" -name "aisol" -type d 2>/dev/null | head -1)
          if [ -n "${AISOL_PATH}" ]; then
            DPF_PATH=$(dirname "${AISOL_PATH}")
            echo "✓ Found aisol at: ${AISOL_PATH}"
          else
            AISOL_PATH=$(find "${GITHUB_WORKSPACE}/dpf-standalone/v252" -name "aisol" -type d 2>/dev/null | head -1)
            if [ -n "${AISOL_PATH}" ]; then
              DPF_PATH=$(dirname "${AISOL_PATH}")
              echo "✓ Found aisol in workspace at: ${AISOL_PATH}"
            fi
          fi
        fi
        
        # Fallback
        if [ -z "${DPF_PATH}" ]; then
          echo "⚠ Could not find DPF binaries, showing structure:"
          echo "Workspace structure:"
          find "${GITHUB_WORKSPACE}/dpf-standalone/v252" -type d -maxdepth 3 2>/dev/null || echo "Not found"
          echo ""
          echo "Site-packages structure:"
          find "${PYTHON_SITE}/ansys_dpf_server_2025_2_pre0" -type d -maxdepth 4 2>/dev/null || echo "Not found"
          
          DPF_PATH="${GITHUB_WORKSPACE}/dpf-standalone/v252"
          echo "Using fallback: ${DPF_PATH}"
        fi
        
        {
          echo "AWP_ROOT252=${DPF_PATH}"
          echo "ANSYS_DPF_PATH=${DPF_PATH}"
          echo "ANSYS_DPF_SERVER_ROOT=${DPF_PATH}"
        } >> "$GITHUB_ENV"
        
        echo "=== DPF environment set to: ${DPF_PATH} ==="
      shell: bash
    - name: Login to GitHub container registry
      if: ${{ inputs.pydyna-run-container != '' }}
      uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
      with:
        registry: ghcr.io
        username: ${{ inputs.github-actor }}
        password: ${{ inputs.github-token }}

    - name: Pull PyDyna-run image
      if: ${{ inputs.pydyna-run-container != '' }}
      env:
        DOCKER_IMAGE: ${{ inputs.pydyna-run-container }}
      run: |
        source .venv/bin/activate
        docker pull $DOCKER_IMAGE
      shell: bash

    - name: Build the html documentation
      env:
        ANSYSLI_SERVERS: 2325@${{ inputs.license-server }}
        ANSYSLMD_LICENSE_FILE: 1055@${{ inputs.license-server }}
        PYDYNA_RUN_CONTAINER: ${{ inputs.pydyna-run-container }}
        BUILD_AUTOKEYWORDS_API: ${{ inputs.build-autokeywords-api }}
        LSTC_LICENSE: ansys
        EXAMPLE_PATTERN: "plot_taylor_bar"
      run: |
        echo "DPF paths: AWP_ROOT252=${AWP_ROOT252}, ANSYS_DPF_PATH=${ANSYS_DPF_PATH}, ANSYS_DPF_SERVER_ROOT=${ANSYS_DPF_SERVER_ROOT}"
        echo "Running examples matching pattern: ${EXAMPLE_PATTERN}"
        source .venv/bin/activate
        timeout 7200 xvfb-run uv run --no-sync -- make -C doc html SPHINXOPTS="-j auto"
      shell: bash

    - name: Upload html documentation
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
      with:
        name: documentation-html
        path: doc/_build/html
        retention-days: 7

    - name: "Build the pdf documentation"
      shell: bash
      run: |
        source .venv/bin/activate
        xvfb-run uv run --no-sync -- make -C doc pdf
      env:
        ANSYSLI_SERVERS: 2325@${{ inputs.license-server }}
        ANSYSLMD_LICENSE_FILE: 1055@${{ inputs.license-server }}
        LSTC_LICENSE: ansys
        PYDYNA_RUN_CONTAINER: ${{ inputs.pydyna-run-container }}
        PYDYNA_RUN_STREAM: "0"
        extra_mem_bot: 20000000
        extra_mem_top: 30000000
        pool_size: ${{ inputs.pdf-pool-size }}
        string_vacancies: ${{ inputs.pdf-string-vacancies }}
        max_strings: ${{ inputs.pdf-max-strings }}

    - name: Upload pdf documentation
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
      with:
        name: documentation-pdf
        path: doc/_build/latex/*.pdf
        retention-days: 7

