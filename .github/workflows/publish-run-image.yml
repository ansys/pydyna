name: Docker images publishing

permissions:
  contents: read  # default; overridden per-job as needed

on:
  workflow_dispatch:
    inputs:
      tagVersion:
        description: 'Tag'
        required: false
        default: latest
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io
  REPO_NAME: ${{ github.repository }}
  IMAGE_TAG: ${{ github.event.inputs.tagVersion || 'latest'}}
  FTP_USER: ${{ secrets.FTP_USER }}
  FTP_LOGIN: ${{ secrets.FTP_PASSWORD }}
  LICENSE_SERVER: ${{ secrets.LICENSE_SERVER }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pydyna-run-containers:
    name: Build the pydyna-run docker image
    runs-on: [public-ubuntu-latest-16-cores]
    permissions:
      contents: read   # Needed to checkout code
      packages: write  # Needed for pushing Docker image to GHCR

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v.11.1

      - name: Login to ghcr.io
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and load image locally
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: docker/run
          file: docker/run/Dockerfile
          load: true
          push: false
          tags: ${{ env.REGISTRY }}/ansys/pydyna-run:${{ env.IMAGE_TAG }}
          build-args: |
            FTP_USER=${{ env.FTP_USER }}
            FTP_LOGIN=${{ env.FTP_LOGIN }}

      - name: "Build documentation"
        uses: ./.github/actions/doc-build
        with:
          build-autokeywords-api: "True"
          pydyna-run-container: ${{ env.REGISTRY }}/ansys/pydyna-run:${{ env.IMAGE_TAG }}
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          license-server: ${{ env.LICENSE_SERVER }}
          bot-token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
          github-actor: ${{ github.actor }}
          use_cache_examples: false
          skip-pull: true  # image was loaded locally by the build step above; not yet pushed to registry

      - name: Push image to registry
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: docker/run
          file: docker/run/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/ansys/pydyna-run:${{ env.IMAGE_TAG }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/ansys/pydyna-run:latest
          build-args: |
            FTP_USER=${{ env.FTP_USER }}
            FTP_LOGIN=${{ env.FTP_LOGIN }}

