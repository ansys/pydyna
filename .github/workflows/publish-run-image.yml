name: Docker images publishing

permissions:
  contents: read  # Needed to checkout code
  packages: read  # Needed for pulling container images from GHCR

on:
  workflow_dispatch:
    inputs:
      tagVersion:
        description: 'Tag'
        required: false
        default: latest
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io
  REPO_NAME: ${{ github.repository }}
  IMAGE_TAG: ${{ github.event.inputs.tagVersion || 'latest'}}
  FTP_USER: ${{ secrets.FTP_USER }}
  FTP_LOGIN: ${{ secrets.FTP_PASSWORD }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pydyna-run-containers:
    name: Build the pydyna-run docker image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v.11.1

      - name: Login to ghcr.io
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and export to Docker
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: docker/run
          file: docker/run/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/ansys/pydyna-run:${{ env.IMAGE_TAG }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/ansys/pydyna-run:latest
          build-args: |
            FTP_USER=${{ env.FTP_USER }}
            FTP_LOGIN=${{ env.FTP_LOGIN }}

