name: Build and Test PyDyna Run Docker Image (PR/Manual)
on:
  pull_request:
    paths:
      - 'docker/run/**'
      - '.github/workflows/build_and_test_run_image.yml'
  workflow_dispatch:
    inputs:
      pydyna-run-tag:
        description: 'Container tag for development testing (unified image with both SMP and MPP)'
        required: false
        default: dev


permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FTP_USER: ${{ secrets.FTP_USER }}
  FTP_LOGIN: ${{ secrets.FTP_PASSWORD }}
  license-server: ${{ secrets.LICENSE_SERVER }}
  MAIN_PYTHON_VERSION: '3.13'
  REGISTRY: ghcr.io
  REPO_NAME: ${{ github.repository }}

jobs:
  test-docker-build:
    name: Build unified Docker image (SMP + MPP) and run tests
    runs-on: ubuntu-latest
    permissions:
      contents: read  # Needed to checkout code
      packages: write # Needed for pushing test image to GHCR
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          persist-credentials: false

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Set up Python
        uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}

      - name: Install PyDyna and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          python -m venv .venv
          source .venv/bin/activate
          uv pip install -e .[tests]

      - name: Build unified Docker image for testing
        run: |
          echo "Building unified Docker image with both SMP and MPP LS-DYNA executables..."
          docker buildx build \
            --build-arg FTP_USER=${FTP_USER} \
            --build-arg FTP_LOGIN=${FTP_LOGIN} \
            --file docker/run/Dockerfile \
            --load \
            -t pydyna-run:dev \
            docker/run

          echo "Verifying Docker image was built successfully..."
          docker images pydyna-run:dev

          echo "Testing basic Docker image functionality..."
          docker run --rm -v $(pwd):/run pydyna-run:dev ls /run

      - name: Run tests with Docker backend
        env:
          PYDYNA_RUN_CONTAINER: pydyna-run:dev
          ANSYSLI_SERVERS: 2325@${{ env.license-server }}
          ANSYSLMD_LICENSE_FILE: 1055@${{ env.license-server }}
          LSTC_LICENSE: ansys
        run: |
          echo "Running run tests with unified Docker backend (auto-selects SMP or MPP)..."
          source .venv/bin/activate
          python -m pytest -m 'run' -ra --cov=ansys.dyna.core --cov-report html:.cov/html --cov-report xml:.cov/xml --cov-report term -vv

  docker-build-and-push:
    needs: test-docker-build
    name: Build and push unified Docker image (SMP + MPP)
    runs-on: ubuntu-latest
    permissions:
      contents: read  # Needed to checkout code
      packages: write # Needed for pushing image to GHCR
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          persist-credentials: false

      - name: Login to ghcr.io
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve Docker image tag
        id: resolve-tag
        env:
          INPUT_TAG: ${{ github.event.inputs.pydyna-run-tag }}
        run: |
          TAG="${INPUT_TAG:-dev}"
          echo "TAG=${TAG}" >> $GITHUB_OUTPUT
          echo "Using tag: ${TAG}"

      - name: Set build context variables
        id: build-vars
        run: |
          echo "context=docker/run" >> $GITHUB_OUTPUT
          echo "dockerfile=docker/run/Dockerfile" >> $GITHUB_OUTPUT

      - name: Build and push Docker image to GHCR
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ${{ steps.build-vars.outputs.context }} # zizmor: ignore[template-injection]
          file: ${{ steps.build-vars.outputs.dockerfile }} # zizmor: ignore[template-injection]
          push: true
          tags: ${{ env.REGISTRY }}/ansys/pydyna-run:${{ steps.resolve-tag.outputs.TAG }}
          build-args: |
            FTP_USER=${{ env.FTP_USER }}
            FTP_LOGIN=${{ env.FTP_LOGIN }}

  run-testing:
    name: Test the "run" subpackage
    runs-on: ubuntu-latest
    needs: docker-build-and-push
    permissions:
      contents: read  # Needed to checkout code
      packages: read  # Needed for pulling container images from GHCR
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/unit-test
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pydyna-run-container: ${{ env.REGISTRY }}/ansys/pydyna-run:${{ github.event.inputs.pydyna-run-tag || 'dev' }}
          pytest-markers: run
          license-server: ${{ secrets.LICENSE_SERVER }}
          coverage-file: run

  doc:
    name: "Documentation build"
    runs-on: ubuntu-latest
    needs: docker-build-and-push
    permissions:
      contents: read  # Needed to checkout code
      packages: read  # Needed for pulling container images from GHCR
    steps:
      - name: "Checkout project"
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: true

      - name: "Build documentation"
        uses: ./.github/actions/doc-build
        with:
          pydyna-run-container: ${{ env.REGISTRY }}/ansys/pydyna-run:${{ github.event.inputs.pydyna-run-tag || 'dev' }}
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          license-server: ${{ secrets.LICENSE_SERVER }}
          bot-token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
          github-actor: ${{ github.actor }}
          use_cache_examples: false # Disable cache for examples in documentation build to avoid cache issues