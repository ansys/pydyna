name: Nightly Build and Test PyDyna Run Docker Images
on:
  # test purpose
  pull_request:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight UTC
  workflow_dispatch:
    inputs:
      pydyna-run-mpp-tag:
        description: 'MPP Container tag for development testing'
        required: false
        default: dev-mpp

      pydyna-run-smp-tag:
        description: 'SMP Container tag for development testing'
        required: false
        default: dev-smp


permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FTP_USER: ${{ secrets.FTP_USER }}
  FTP_LOGIN: ${{ secrets.FTP_PASSWORD }}
  license-server: ${{ secrets.LICENSE_SERVER }}
  MAIN_PYTHON_VERSION: '3.13'
  REGISTRY: ghcr.io
  REPO_NAME: ${{ github.repository }}

jobs:
  test-docker-build:
    name: Build ${{ matrix.image-type }} Docker image and run tests
    runs-on: ubuntu-latest
    permissions:
      contents: read  # Needed to checkout code
      packages: write # Needed for pushing test image to GHCR
    strategy:
      fail-fast: false
      matrix:
        include:
          - image-type: smp
            context: docker/run/SMP
            dockerfile: docker/run/SMP/Dockerfile
            docker-image: pydyna-run:dev-smp
          - image-type: mpp
            context: docker/run/MPP
            dockerfile: docker/run/MPP/Dockerfile
            docker-image: pydyna-run:dev-mpp
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          persist-credentials: false

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Set up Python
        uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}

      - name: Install PyDyna and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          python -m venv .venv
          source .venv/bin/activate
          uv pip install -e .[tests]

      - name: Build Docker image for testing
        run: |
          echo "Building ${{ matrix.image-type }} Docker image with LS-DYNA..."
          docker buildx build \
            --build-arg FTP_USER=${FTP_USER} \
            --build-arg FTP_LOGIN=${FTP_LOGIN} \
            --file ${{ matrix.dockerfile }} \
            --load \
            -t ${{ matrix.docker-image }} \
            ${{ matrix.context }}

          echo "Verifying Docker image was built successfully..."
          docker images ${{ matrix.docker-image }}

          echo "Testing basic Docker image functionality..."
          docker run --rm -v $(pwd):/run ${{ matrix.docker-image }} ls /run

      - name: Run tests with Docker backend
        run: |
          echo "Running run tests with ${{ matrix.image-type }} Docker backend..."
          source .venv/bin/activate
          python -m pytest -m 'run' -ra --cov=ansys.dyna.core --cov-report html:.cov/html --cov-report xml:.cov/xml --cov-report term -vv
        env:
          PYDYNA_RUN_CONTAINER: ${{ matrix.docker-image }}
          ANSYSLI_SERVERS: 2325@${{ env.license-server }}
          ANSYSLMD_LICENSE_FILE: 1055@${{ env.license-server }}
          LSTC_LICENSE: ansys

  docker-build-and-push:
    needs: test-docker-build
    name: Build and push ${{ matrix.image-type }} Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read  # Needed to checkout code
      packages: write # Needed for pushing image to GHCR
    strategy:
      fail-fast: false
      matrix:
        include:
          - image-type: smp
            context: docker/run/SMP
            dockerfile: docker/run/SMP/Dockerfile
            default-tag: dev-smp
          - image-type: mpp
            context: docker/run/MPP
            dockerfile: docker/run/MPP/Dockerfile
            default-tag: dev-mpp
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          persist-credentials: false

      - name: Login to ghcr.io
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve Docker image tag
        id: resolve-tag
        env:
          SMP_TAG: ${{ github.event.inputs.pydyna-run-smp-tag || matrix.default-tag }}
          MPP_TAG: ${{ github.event.inputs.pydyna-run-mpp-tag || matrix.default-tag }}
        run: |
          if [ "${{ matrix.image-type }}" == "smp" ]; then
            echo "TAG=$SMP_TAG" >> $GITHUB_OUTPUT
          else
            echo "TAG=$MPP_TAG" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image to GHCR
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ env.REGISTRY }}/ansys/pydyna-run:${{ steps.resolve-tag.outputs.TAG }}
          build-args: |
            FTP_USER=${{ env.FTP_USER }}
            FTP_LOGIN=${{ env.FTP_LOGIN }}

  run-testing:
    name: Test the "run" subpackage
    runs-on: ubuntu-latest
    needs: docker-build-and-push
    permissions:
      contents: read  # Needed to checkout code
      packages: read  # Needed for pulling container images from GHCR
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/unit-test
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pydyna-run-container: ${{ env.REGISTRY }}/ansys/pydyna-run:${{ github.event.inputs.pydyna-run-smp-tag || 'dev-smp' }} # Use SMP image for testing
          pytest-markers: run
          license-server: ${{ secrets.LICENSE_SERVER }}
          coverage-file: run

  doc:
    name: "Documentation build"
    runs-on: ubuntu-latest
    needs: docker-build-and-push
    permissions:
      contents: read  # Needed to checkout code
      packages: read  # Needed for pulling container images from GHCR
    steps:
      - name: "Checkout project"
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: true

      - name: "Build documentation"
        uses: ./.github/actions/doc-build
        with:
          pydyna-run-container: ${{ env.REGISTRY }}/ansys/pydyna-run:${{ github.event.inputs.pydyna-run-smp-tag || 'dev-smp' }} # Use SMP image for documentation build
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          license-server: ${{ secrets.LICENSE_SERVER }}
          bot-token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
          github-actor: ${{ github.actor }}
          use_cache_examples: false # Disable cache for examples in documentation build to avoid cache issues