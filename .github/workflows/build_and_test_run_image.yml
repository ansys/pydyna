name: Nightly Build and Test PyDyna Run Docker Images
on:
  # test purpose
  pull_request:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight UTC
  workflow_dispatch:
    inputs:
      pydyna-run-mpp-container:
        description: 'MPP Container image for development testing'
        required: false
        default: ghcr.io/ansys/pydyna-run:dev-mpp

      pydyna-run-smp-container:
        description: 'SMP Container image for development testing'
        required: false
        default: ghcr.io/ansys/pydyna-run:dev-smp


permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FTP_USER: ${{ secrets.FTP_USER }}
  FTP_LOGIN: ${{ secrets.FTP_PASSWORD }}
  license-server: ${{ secrets.LICENSE_SERVER }}
  MAIN_PYTHON_VERSION: '3.13'
  REGISTRY: ghcr.io
  REPO_NAME: ${{ github.repository }}
  SMP_DOCKER_IMAGE: ${{ github.event.inputs.pydyna-run-smp-container || 'ghcr.io/ansys/pydyna-run:dev-smp' }}
  MPP_DOCKER_IMAGE: ${{ github.event.inputs.pydyna-run-mpp-container || 'ghcr.io/ansys/pydyna-run:dev-mpp' }}
  

jobs:
  test-docker-build:
    name: Build smp and mpp docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read  # Needed to checkout code
      packages: write # Needed for pushing test image to GHCR
    strategy:
      fail-fast: false
      matrix:
        include:
          - image-type: smp
            context: docker/run/SMP
            dockerfile: docker/run/SMP/Dockerfile
            docker-image: pydyna-run:dev-smp
          - image-type: mpp
            context: docker/run/MPP
            dockerfile: docker/run/MPP/Dockerfile
            docker-image: pydyna-run:dev-mpp
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          persist-credentials: false

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Set up Python
        uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}

      - name: Install PyDyna and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          python -m venv .venv
          source .venv/bin/activate
          uv pip install -e .[tests]

      - name: Build Docker image for testing
        run: |
          echo "Building ${{ matrix.image-type }} Docker image with LS-DYNA..."
          docker buildx build \
            --build-arg FTP_USER=${FTP_USER} \
            --build-arg FTP_LOGIN=${FTP_LOGIN} \
            --file ${{ matrix.dockerfile }} \
            --load \
            -t ${{ matrix.docker-image }} \
            ${{ matrix.context }}

          echo "Verifying Docker image was built successfully..."
          docker images ${{ matrix.docker-image }}

          echo "Testing basic Docker image functionality..."
          docker run --rm -v $(pwd):/run ${{ matrix.docker-image }} ls /run

      - name: Run tests with Docker backend
        run: |
          echo "Running run tests with ${{ matrix.image-type }} Docker backend..."
          source .venv/bin/activate
          python -m pytest -m 'run' -ra --cov=ansys.dyna.core --cov-report html:.cov/html --cov-report xml:.cov/xml --cov-report term -vv
        env:
          PYDYNA_RUN_CONTAINER: ${{ matrix.docker-image }}
          ANSYSLI_SERVERS: 2325@${{ env.license-server }}
          ANSYSLMD_LICENSE_FILE: 1055@${{ env.license-server }}
          LSTC_LICENSE: ansys

      # - name: Login to ghcr.io
